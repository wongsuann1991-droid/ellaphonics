<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ece5d0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Frankel Phonics">
<title>Frankel Phonics — Dashboard</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --p0:      #faf6ed;
  --p1:      #f5f0e4;
  --p2:      #ece5d0;
  --p3:      #ddd4be;
  --p4:      #c8bc9e;
  --ink:     #26200f;
  --ink-2:   #4a3c22;
  --ink-3:   #7a6840;
  --ink-4:   #a8956a;
  --ink-5:   #c8b080;
  --cur-bg:  #ede4cc;
}

html, body {
  height: 100%; width: 100%;
  background: var(--p1);
  color: var(--ink);
  font-family: 'Lora', serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── Shell ──────────────────────────────────────────────── */
#shell { display: flex; flex-direction: column; height: 100vh; }

/* ── Top bar ────────────────────────────────────────────── */
#topbar {
  flex-shrink: 0;
  background: var(--p2);
  border-bottom: 1.5px solid var(--p4);
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 18px;
}

.tb-wordmark { display: flex; flex-direction: column; gap: 1px; }

.tb-name {
  font-family: 'IM Fell English', serif;
  font-size: 18px;
  color: var(--ink);
  line-height: 1;
}

.tb-sub {
  font-family: 'Lora', serif;
  font-size: 9.5px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--ink-3);
}

.tb-divider {
  width: 1px;
  height: 24px;
  background: var(--p4);
  flex-shrink: 0;
}

.tb-spacer { flex: 1; }


.tb-back {
  font-family: 'Lora', serif;
  font-size: 11px;
  color: var(--ink-3);
  text-decoration: none;
  letter-spacing: 0.05em;
  padding: 5px 12px;
  border: 1px solid var(--p4);
  transition: border-color 0.2s, color 0.2s;
  white-space: nowrap;
}
.tb-back:hover { border-color: var(--ink-2); color: var(--ink); }


/* ── Scroll area ────────────────────────────────────────── */
#scrollArea {
  flex: 1;
  overflow-y: auto;
  padding: 28px 28px 60px;
  scroll-behavior: smooth;
}
#scrollArea::-webkit-scrollbar { width: 4px; }
#scrollArea::-webkit-scrollbar-thumb { background: var(--p4); }

/* ── Term section ───────────────────────────────────────── */
.term-section { margin-bottom: 40px; }

.term-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}

.term-title {
  font-family: 'IM Fell English', serif;
  font-size: 20px;
  color: var(--ink);
  white-space: nowrap;
}

.term-sub {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--ink-3);
}

.term-rule {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--p4), transparent);
}

/* ── Week row ───────────────────────────────────────────── */
.week-row {
  margin-bottom: 10px;
  border: 1px solid var(--p3);
  overflow: hidden;
  transition: border-color 0.2s;
}
.week-row:hover { border-color: var(--p4); }
.week-row.current { border-color: var(--ink-2); }
.week-row.review-week { border-style: dashed; }

@keyframes rowIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.week-row { animation: rowIn 0.35s ease both; }

/* ── Week meta bar ──────────────────────────────────────── */
.week-meta {
  display: flex;
  align-items: center;
  padding: 9px 16px;
  gap: 12px;
  background: var(--p2);
  border-bottom: 1px solid var(--p3);
  cursor: pointer;
  user-select: none;
}
.week-row.current .week-meta { background: var(--cur-bg); }

.week-num {
  font-family: 'IM Fell English', serif;
  font-size: 14px;
  color: var(--ink);
  min-width: 50px;
}

.week-theme {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--ink-3);
  flex: 1;
}

.week-tricky {
  display: flex;
  align-items: center;
  gap: 6px;
}

.wt-label {
  font-family: 'Lora', serif;
  font-size: 9.5px;
  letter-spacing: 0.1em;
  color: var(--ink-5);
}

.tricky-chip {
  font-family: 'IM Fell English', serif;
  font-size: 13px;
  color: var(--ink-2);
  border: 1px solid var(--p4);
  padding: 1px 8px;
  background: var(--p1);
}

.week-badge {
  font-family: 'Lora', serif;
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  border: 1px solid var(--p4);
  padding: 2px 7px;
}

.week-current-badge {
  font-family: 'Lora', serif;
  font-size: 9.5px;
  letter-spacing: 0.08em;
  color: var(--p1);
  background: var(--ink-2);
  padding: 2px 8px;
}

.week-chevron {
  font-size: 11px;
  color: var(--ink-4);
  transition: transform 0.25s;
  margin-left: 8px;
  flex-shrink: 0;
}
.week-row.open .week-chevron { transform: rotate(180deg); }

/* ── Day grid ───────────────────────────────────────────── */
.day-grid {
  display: none;
  grid-template-columns: repeat(5, 1fr);
  border-top: 1px solid var(--p3);
}
.week-row.open .day-grid { display: grid; }

/* ── Review body ────────────────────────────────────────── */
.review-body {
  display: none;
  padding: 16px 20px;
  border-top: 1px solid var(--p3);
  background: var(--p1);
}
.week-row.open .review-body { display: block; }

.review-text {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.8;
  max-width: 600px;
}

.review-sounds {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}

.review-sound {
  font-family: 'IM Fell English', serif;
  font-size: 18px;
  color: var(--ink-2);
  border: 1px solid var(--p4);
  padding: 3px 10px;
  background: var(--p1);
}

/* ── Day cell ───────────────────────────────────────────── */
.day-cell {
  padding: 12px 10px 14px;
  border-right: 1px solid var(--p3);
  background: var(--p1);
  display: flex;
  flex-direction: column;
  gap: 7px;
  position: relative;
  cursor: pointer;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.day-cell:last-child { border-right: none; }
.day-cell:hover { background: var(--p2); }

.dc-label {
  font-family: 'Lora', serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-5);
}

.dc-sound {
  font-family: 'IM Fell English', serif;
  font-size: 28px;
  color: var(--ink);
  line-height: 1;
  min-height: 34px;
  display: flex;
  align-items: flex-end;
}
.dc-sound.long { font-size: 20px; }

.dc-words {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.dc-word {
  font-family: 'Lora', serif;
  font-size: 10px;
  color: var(--ink-3);
  line-height: 1.3;
}


/* ── Teaching notes ─────────────────────────────────────── */
.teaching-notes {
  padding: 12px 16px;
  border-top: 1px dashed var(--p4);
  background: var(--p2);
  display: none;
}
.week-row.open .teaching-notes.visible { display: block; }

.tn-title {
  font-family: 'Lora', serif;
  font-size: 9.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 8px;
}

.tn-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.tn-list li {
  font-family: 'Lora', serif;
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.6;
  padding-left: 14px;
  position: relative;
}
.tn-list li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--ink-5);
}

/* ── Tooltip ────────────────────────────────────────────── */
.day-tooltip {
  position: fixed;
  z-index: 200;
  background: var(--ink);
  color: var(--p1);
  font-family: 'Lora', serif;
  font-size: 12px;
  padding: 8px 14px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  max-width: 200px;
  line-height: 1.6;
}
.day-tooltip.show { opacity: 1; }

.tt-sound {
  font-family: 'IM Fell English', serif;
  font-size: 15px;
  margin-bottom: 4px;
}
.tt-action { font-size: 11px; opacity: 0.8; line-height: 1.5; }
.tt-words  { font-size: 10px; opacity: 0.6; margin-top: 3px; }
</style>
</head>
<body>
<div id="shell">

  <div id="topbar">
    <a class="tb-back" href="index.html">&#8592; Home</a>
    <div class="tb-divider"></div>
    <div class="tb-wordmark">
      <div class="tb-name">Frankel Phonics</div>
    </div>
    <div class="tb-spacer"></div>
    <a class="tb-back" href="planner.html">Daily Planner &#8594;</a>
  </div>

  <div id="scrollArea"></div>
</div>

<div class="day-tooltip" id="tooltip"></div>

<script src="jp-data.js"></script>
<script>
const D           = window.JP;
const STORAGE_KEY = 'gp_dash_v1';
const DAY_KEY     = 'ella_phonics_day';

let state = {
  currentDay: parseInt(localStorage.getItem(DAY_KEY) || '1', 10),
  open: {}
};

try {
  const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if (s.open) state.open = s.open;
} catch(e) {}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ open: state.open }));
  } catch(e) {}
}

function weekForDay(day) { return Math.ceil(day / 5); }
const currentWeek = Math.max(1, Math.min(36, weekForDay(state.currentDay)));

function ds(s) {
  if (s === 'oo2') return 'oo';
  if (s === 'th2') return 'th';
  return s.replace(/\(.*/, '');
}

/* ── Render ─────────────────────────────────────────────── */
function render() {
  const area = document.getElementById('scrollArea');
  area.innerHTML = '';

  D.terms.forEach(term => {
    const weeks = D.weeks.filter(w => w.term === term.id);
    const section = document.createElement('div');
    section.className = 'term-section';
    section.innerHTML =
      '<div class="term-header">' +
        '<div class="term-title">' + term.name + '</div>' +
        '<div class="term-sub">' + term.sub + '</div>' +
        '<div class="term-rule"></div>' +
      '</div>';

    weeks.forEach((week, wi) => {
      const isCurrentWeek = week.week === currentWeek;
      const isOpen        = state.open[week.week] ?? isCurrentWeek;
      const isReview      = !!week.review;
      const weekStartDay  = (week.week - 1) * 5 + 1;

      const row = document.createElement('div');
      row.className = ['week-row',
        isCurrentWeek ? 'current'     : '',
        isOpen        ? 'open'        : '',
        isReview      ? 'review-week' : ''
      ].filter(Boolean).join(' ');
      row.style.animationDelay = (wi * 0.04) + 's';

      const trickyHtml = week.trickyWords && week.trickyWords.length
        ? '<div class="week-tricky"><span class="wt-label">tricky:</span>' +
          week.trickyWords.map(tw => '<span class="tricky-chip">' + tw + '</span>').join('') +
          '</div>' : '';

      const badgeHtml = isCurrentWeek
        ? '<span class="week-current-badge">Current</span>'
        : (week.capitals ? '<span class="week-badge">Capitals</span>' : '') +
          (isReview      ? '<span class="week-badge">Review</span>'   : '');

      let dayCellsHtml = '';
      if (!isReview) {
        week.sounds.slice(0, 5).forEach((sound, di) => {
          const dayNum   = weekStartDay + di;
          const info     = D.sounds[sound] || { w: [] };
          const soundStr = ds(sound);
          const isLong   = soundStr.length > 2;

          dayCellsHtml +=
            '<div class="day-cell" data-day="' + dayNum + '">' +
              '<div class="dc-label">' + D.days[di].slice(0,3).toUpperCase() + ' \u00b7 ' + dayNum + '</div>' +
              '<div class="dc-sound' + (isLong ? ' long' : '') + '">' + soundStr + '</div>' +
              '<div class="dc-words">' +
                info.w.slice(0, 2).map(w => '<div class="dc-word">' + w + '</div>').join('') +
              '</div>' +
            '</div>';
        });
      }

      const notesHtml =
        '<div class="teaching-notes visible">' +
          '<div class="tn-title">Teaching Notes</div>' +
          '<ul class="tn-list">' +
            '<li>Introduce each new sound with the Jolly Phonics action and story</li>' +
            '<li>Flash cards — review all sounds taught so far, daily</li>' +
            '<li>Blending practice: adult says phonemes, student blends into word</li>' +
            '<li>Dictation: call words aloud, student segments and writes</li>' +
          '</ul>' +
        '</div>';

      row.innerHTML =
        '<div class="week-meta" data-week="' + week.week + '">' +
          '<div class="week-num">Week ' + week.week + '</div>' +
          '<div class="week-theme">' + week.theme + '</div>' +
          trickyHtml + badgeHtml +
          '<span class="week-chevron">&#9660;</span>' +
        '</div>' +
        (!isReview
          ? '<div class="day-grid">' + dayCellsHtml + '</div>' + notesHtml
          : '<div class="review-body">' +
              '<div class="review-text">' + (week.reviewNote || '') + '</div>' +
              '<div class="review-sounds">' +
                week.sounds.map(s => '<span class="review-sound">' + ds(s) + '</span>').join('') +
              '</div>' +
            '</div>');

      section.appendChild(row);
    });

    area.appendChild(section);
  });

  attachEvents();
  scrollToCurrentWeek();
}

function scrollToCurrentWeek() {
  setTimeout(() => {
    const cur = document.querySelector('.week-row.current');
    if (cur) document.getElementById('scrollArea').scrollTop = cur.offsetTop - 40;
  }, 100);
}

/* ── Events ─────────────────────────────────────────────── */
function attachEvents() {
  document.querySelectorAll('.week-meta').forEach(el => {
    el.addEventListener('click', () => {
      const wk  = Number(el.dataset.week);
      const row = el.closest('.week-row');
      const was = row.classList.contains('open');
      row.classList.toggle('open', !was);
      state.open[wk] = !was;
      save();
    });
  });

  document.querySelectorAll('.day-cell').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const day = Number(el.dataset.day);
      localStorage.setItem(DAY_KEY, String(day));
      save();
      window.location.href = 'planner.html';
    });
  });

  const tooltip = document.getElementById('tooltip');
  document.querySelectorAll('.day-cell').forEach(el => {
    el.addEventListener('mouseenter', e => {
      const day     = Number(el.dataset.day);
      const weekNum = weekForDay(day);
      const week    = D.weeks.find(w => w.week === weekNum);
      const di      = (day - 1) % 5;
      if (!week || week.review) return;
      const sound    = week.sounds[di];
      const info     = D.sounds[sound] || { a: '', w: [] };
      const soundStr = ds(sound);
      tooltip.innerHTML =
        '<div class="tt-sound">/' + soundStr + '/</div>' +
        '<div class="tt-action">' + info.a + '</div>' +
        '<div class="tt-words">'  + info.w.join(' \u00b7 ') + '</div>';
      tooltip.classList.add('show');
      moveTooltip(e);
    });
    el.addEventListener('mousemove', moveTooltip);
    el.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
  });
}

function moveTooltip(e) {
  const t = document.getElementById('tooltip');
  t.style.left = Math.min(e.clientX + 12, window.innerWidth  - 220) + 'px';
  t.style.top  = Math.min(e.clientY + 16, window.innerHeight - 120) + 'px';
}


/* ── Fade in ────────────────────────────────────────────── */
document.body.style.opacity = '0';
document.body.style.transition = 'opacity 0.6s ease';
requestAnimationFrame(() => requestAnimationFrame(() => {
  document.body.style.opacity = '1';
}));

render();
</script>
</body>
</html>
